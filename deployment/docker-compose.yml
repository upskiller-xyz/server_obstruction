version: '3.8'

services:
  obstruction-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: obstruction-server
    restart: unless-stopped
    ports:
      - "8081:8081"  # Map host port 8081 to container port 8081
    environment:
      - PORT=8081
      - WORKERS=${WORKERS:-4}
      - THREADS=${THREADS:-2}
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - CUDA_VISIBLE_DEVICES=-1
      - TF_CPP_MIN_LOG_LEVEL=3
      - OPENCV_IO_ENABLE_OPENEXR=0
      - OMP_NUM_THREADS=1
    env_file:
      - .env.docker
    volumes:
      # Optional: Mount logs directory for persistence
      - ./logs:/var/log/obstruction-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - obstruction-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: obstruction-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      # Optional: SSL certificates
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - obstruction-server
    networks:
      - obstruction-network
    profiles:
      - with-nginx

networks:
  obstruction-network:
    driver: bridge
